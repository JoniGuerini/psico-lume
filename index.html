<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lume — Sua clínica em foco</title>
    <script>
      try {
        var theme = localStorage.getItem("lume-theme");
        var valid = { lume: 1, refugio: 1, coral: 1 };
        document.documentElement.dataset.theme =
          valid[theme] ? theme : "refugio";
        if (localStorage.getItem("lume-density") === "compact") {
          document.documentElement.dataset.density = "compact";
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
